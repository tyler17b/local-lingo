name: Validate

on:
  push:
    branches: [main, develop, "feature/**", "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  language-packs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python scripts/validate_language_packs.py
      - run: python -m compileall custom_components/local_lingo

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip pytest
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --check www/local_lingo/local-lingo-cards.js

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  package:
    runs-on: ubuntu-latest
    needs: [language-packs, unit-tests, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build config overlay
        run: |
          mkdir -p dist/config/custom_components dist/config/www
          cp -R custom_components/local_lingo dist/config/custom_components/
          cp -R www/local_lingo dist/config/www/
          cd dist/config
          zip -r ../local-lingo-config-overlay.zip custom_components www
      - uses: actions/upload-artifact@v4
        with:
          name: local-lingo-config-overlay
          path: dist/local-lingo-config-overlay.zip
          retention-days: 30
